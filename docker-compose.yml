services:
  mysql:
    image: mysql:8.4
    container_name: pm-tool-mysql
    environment:
      MYSQL_DATABASE: pm_tool
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pm-tool-app
    depends_on:
      - mysql
    environment:
      PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/pm_tool
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports:
      - "8080:8080"

volumes:
  mysql-data:
